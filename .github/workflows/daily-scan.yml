name: Daily Reminder Scan

on:
  schedule:
    # 北京时间每天 9:00 和 14:00（UTC 1:00 和 6:00）
    - cron: '0 1,6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run daily scan
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          SMARTSHEET_WEBHOOK: ${{ secrets.SMARTSHEET_WEBHOOK }}
        run: python scripts/daily_scan.py

      - name: Commit data changes
        run: |
          git config user.name "hf-daily-bot"
          git config user.email "bot@hf-daily.local"
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git add data/
            git commit -m "📊 自动更新项目数据 [$(date -u -d '+8 hours' '+%Y-%m-%d %H:%M')]"
            git push
          fi
