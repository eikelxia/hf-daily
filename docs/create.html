<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新建项目 - 开店助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0f2f5}
.container{max-width:600px;margin:0 auto;padding:20px}
.card{background:#fff;border-radius:12px;padding:32px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:16px}
h1{font-size:22px;margin-bottom:4px}
.sub{color:#999;font-size:14px;margin-bottom:24px}
label{display:block;font-size:14px;color:#333;margin-bottom:6px;font-weight:500}
input,select{width:100%;padding:10px 14px;border:1px solid #d9d9d9;border-radius:8px;font-size:15px;margin-bottom:16px;outline:none}
input:focus,select:focus{border-color:#1677ff}
.btn{width:100%;padding:12px;background:#1677ff;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-weight:500}
.btn:hover{background:#4096ff}
.btn:disabled{background:#999;cursor:not-allowed}
.btn-green{background:#52c41a}.btn-green:hover{background:#73d13d}
.result{margin-top:16px;padding:14px;border-radius:8px;display:none;font-size:14px}
.success{background:#f6ffed;border:1px solid #b7eb8f;color:#52c41a}
.error{background:#fff2f0;border:1px solid #ffccc7;color:#ff4d4f}
.preview{display:none;background:#fafafa;border-radius:8px;padding:16px;font-size:13px;max-height:400px;overflow-y:auto;margin-top:16px}
.preview h3{font-size:15px;margin-bottom:12px;color:#1677ff}
.preview table{width:100%;border-collapse:collapse;font-size:12px}
.preview th{background:#f0f0f0;padding:6px 8px;text-align:left;font-size:12px}
.preview td{padding:4px 8px;border-bottom:1px solid #eee}
.preview tr:nth-child(even){background:#fafafa}
.nav{background:#1677ff;padding:12px 20px;display:flex;gap:20px;align-items:center}
.nav a{color:#fff;text-decoration:none;font-weight:500;font-size:14px}
.stats{display:flex;gap:12px;margin:16px 0}
.stat{padding:8px 16px;background:#f5f5f5;border-radius:6px;text-align:center}
.stat-num{font-size:18px;font-weight:bold;color:#1677ff}
.stat-label{font-size:11px;color:#999}
.loading{display:none;text-align:center;padding:40px}
.loading .spinner{width:40px;height:40px;border:3px solid #e8e8e8;border-top-color:#1677ff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="nav">
  <strong style="color:#fff;font-size:15px">🏗️ 开店助手</strong>
  <a href="/hf-daily/">📋 项目看板</a>
  <a href="/hf-daily/create" style="opacity:.8">➕ 新建项目</a>
</div>
<div class="container">
<div class="card">
<h1>➕ 新建开店项目</h1>
<p class="sub">填写门店信息，自动排出完整施工时间线，一键创建项目</p>

<form id="form">
<label>项目名称</label>
<input id="name" placeholder="例如：万象城店" required>

<label>门店名称</label>
<input id="store" placeholder="例如：万象城店" required>

<label>目标开业日期</label>
<input id="date" type="date" required>

<label>门店面积（㎡）</label>
<input id="area" type="number" placeholder="80" required min="20" max="500" value="80">

<button type="submit" class="btn">🚀 生成项目时间线</button>
</form>

<div id="result" class="result"></div>
<div id="preview" class="preview"></div>
<div id="loadingBox" class="loading">
  <div class="spinner"></div>
  <p style="color:#666;font-size:14px">正在创建项目，请稍候...</p>
</div>
</div>
</div>

<script>
// ═══════════════════════════════════════════
// 本地时间线计算（预览用，和 Python 端逻辑一致）
// ═══════════════════════════════════════════
function generateTimeline(openingDateStr, area) {
  const openingDate = new Date(openingDateStr + "T00:00:00");
  const today = new Date();
  today.setHours(0,0,0,0);

  function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
  function subDays(d, n) { const r = new Date(d); r.setDate(r.getDate()-n); return r; }
  function fmt(d) { return d.toISOString().split("T")[0]; }

  const calcWaterElec = a => a <= 60 ? 1 : a <= 100 ? 2 : 3;
  const calcTile = a => Math.ceil(a / 50);
  const calcPaint = a => a <= 100 ? 5 : Math.ceil(a / 100) * 5;
  const calcCabinet = a => a <= 60 ? 7 : 14;

  const MANUAL = new Set(["合同签约","平面图确认","效果图确认","施工图确认","空调确认","消防改造"]);

  const templates = [
    ["前期资料搜集","milestone","startup",2,null,"我",false],
    ["催促基础资料提交","milestone","startup",1,"前期资料搜集","我",false],
    ["提供门店完全尺寸(CAD)","milestone","startup",2,null,"加盟商",false],
    ["平面图出图","milestone","startup",2,"提供门店完全尺寸(CAD)","我",false],
    ["平面图确认","milestone","startup",1,"平面图出图","加盟商",false],
    ["效果图出图","milestone","startup",3,"平面图确认","我",false],
    ["效果图确认","milestone","startup",1,"效果图出图","加盟商",false],
    ["施工图出图","milestone","startup",3,"效果图确认","我",false],
    ["施工图确认","milestone","startup",1,"施工图出图","加盟商",false],
    ["合同签约","milestone","startup",2,null,"加盟商",false],
    ["营业执照办理","milestone","startup",7,"合同签约","加盟商",true],
    ["预定柜体","construction","construction",calcCabinet(area),"施工图确认","加盟商",false],
    ["空调确认","construction","construction",2,null,"加盟商",false],
    ["办理进场资料","construction","construction",1,"施工图确认","加盟商/施工负责人",false],
    ["人员招聘","milestone","construction",1,"办理进场资料","加盟商+小朱",false],
    ["砖块隔墙","construction","construction",2,"办理进场资料","加盟商/施工负责人",false],
    ["水电改造","construction","construction",calcWaterElec(area),"砖块隔墙","加盟商/施工负责人",false],
    ["地砖铺贴","construction","construction",calcTile(area),"水电改造","加盟商/施工负责人",false],
    ["消防改造","construction","construction",3,null,"加盟商+二消",false],
    ["木工","construction","construction",2,"地砖铺贴","加盟商/施工负责人",false],
    ["广告字预订","construction","construction",5,"木工","加盟商/施工负责人",false],
    ["漆工","construction","construction",calcPaint(area),"木工","加盟商/施工负责人",false],
    ["柜体安装","construction","construction",2,"漆工","加盟商/施工负责人",false],
    ["灯具安装","construction","construction",2,"漆工","加盟商/施工负责人",false],
    ["广告字安装","construction","construction",1,"漆工","加盟商/施工负责人",false],
    ["美缝保洁","construction","construction",1,"柜体安装","加盟商/施工负责人",false],
    ["家具物料进场","construction","construction",2,"美缝保洁","加盟商/施工负责人",false],
    ["装修验收","milestone","construction",1,"家具物料进场","加盟商/施工负责人",true],
    ["货品货单确认","countdown","countdown",14,null,"王雅",false],
    ["设计物料确认","countdown","countdown",7,null,"陈哇塞",false],
    ["开业活动确认","countdown","countdown",7,null,"陈哇塞",false],
    ["线上培训","countdown","countdown",4,null,"小朱",false],
    ["培训时间确认","countdown","countdown",7,null,"我",false],
    ["开业活动物料到场","countdown","countdown",3,null,"加盟商",false],
    ["美团/抖音/银豹搭建","countdown","countdown",3,null,"陈哇塞",false],
    ["线下到店培训","countdown","countdown",2,null,"我",false],
    ["开业验收","countdown","countdown",1,null,"我",false],
  ];

  const nodes = templates.map(([name, ntype, stage, duration, dependsOn, assignee, isCritical], i) => ({
    name, node_type: ntype, stage, duration,
    planned_start: null, planned_end: null,
    assignee, depends_on: dependsOn,
    is_critical: isCritical, sort_order: i,
  }));

  const nodeMap = {};
  nodes.forEach(n => { nodeMap[n.name] = n; });

  nodes.forEach(n => {
    if (n.stage === "countdown") {
      n.planned_end = fmt(subDays(openingDate, n.duration));
      n.planned_start = n.planned_end;
    }
  });

  let currentDate = today;
  const startupOrder = ["前期资料搜集","催促基础资料提交","提供门店完全尺寸(CAD)","平面图出图","平面图确认","效果图出图","效果图确认","施工图出图","施工图确认"];
  startupOrder.forEach(name => {
    const n = nodeMap[name];
    if (!n || n.stage !== "startup") return;
    if (MANUAL.has(name)) { n.planned_start = null; n.planned_end = null; return; }
    const dep = n.depends_on;
    if (dep && nodeMap[dep] && nodeMap[dep].planned_end) {
      currentDate = new Date(nodeMap[dep].planned_end + "T00:00:00");
    }
    n.planned_start = fmt(currentDate);
    n.planned_end = fmt(addDays(currentDate, n.duration));
    currentDate = new Date(n.planned_end + "T00:00:00");
  });

  let consStart = nodeMap["施工图确认"]?.planned_end || nodeMap["施工图出图"]?.planned_end || fmt(today);
  currentDate = new Date(consStart + "T00:00:00");

  const consOrder = ["预定柜体","办理进场资料","人员招聘","砖块隔墙","水电改造","地砖铺贴","木工","漆工","广告字预订","柜体安装","灯具安装","广告字安装","美缝保洁","家具物料进场","装修验收"];
  consOrder.forEach(name => {
    const n = nodeMap[name];
    if (!n || n.stage !== "construction") return;
    if (MANUAL.has(name)) return;
    const dep = n.depends_on;
    if (dep && nodeMap[dep] && nodeMap[dep].planned_end) {
      currentDate = new Date(nodeMap[dep].planned_end + "T00:00:00");
    }
    n.planned_start = fmt(currentDate);
    n.planned_end = fmt(addDays(currentDate, n.duration));
    currentDate = new Date(n.planned_end + "T00:00:00");
  });

  const woodEnd = nodeMap["木工"]?.planned_end;
  if (woodEnd) {
    ["漆工","广告字预订"].forEach(name => {
      const n = nodeMap[name];
      if (n && !n.planned_start) {
        n.planned_start = woodEnd;
        n.planned_end = fmt(addDays(new Date(woodEnd+"T00:00:00"), n.duration));
      }
    });
  }

  const paintEnd = nodeMap["漆工"]?.planned_end;
  if (paintEnd) {
    ["柜体安装","灯具安装","广告字安装"].forEach(name => {
      const n = nodeMap[name];
      if (n && !n.planned_start) {
        n.planned_start = paintEnd;
        n.planned_end = fmt(addDays(new Date(paintEnd+"T00:00:00"), n.duration));
      }
    });
  }

  return nodes;
}

// ═══════════════════════════════════════════
// 表单处理
// ═══════════════════════════════════════════
const FC_URL = "https://hf-daily-jrelwswabz.cn-hangzhou.fcapp.run/create";

document.getElementById("form").addEventListener("submit", async e => {
  e.preventDefault();
  const btn = e.target.querySelector("button");
  const result = document.getElementById("result");
  const preview = document.getElementById("preview");
  const loadingBox = document.getElementById("loadingBox");

  const name = document.getElementById("name").value.trim();
  const store = document.getElementById("store").value.trim();
  const dateVal = document.getElementById("date").value;
  const area = parseFloat(document.getElementById("area").value);

  // 第一阶段：预览
  if (btn.textContent.includes("生成")) {
    btn.textContent = "⏳ 计算中...";
    btn.disabled = true;
    result.style.display = "none";
    preview.style.display = "none";

    const nodes = generateTimeline(dateVal, area);
    const startupCount = nodes.filter(n => n.stage === "startup").length;
    const consCount = nodes.filter(n => n.stage === "construction").length;
    const cdCount = nodes.filter(n => n.stage === "countdown").length;

    const stages = {startup:"启动",construction:"装修",countdown:"倒计时"};
    let previewHTML = `<h3>📅 ${name} — 节点时间线预览</h3>`;
    previewHTML += `<div class="stats">
      <div class="stat"><div class="stat-num">${nodes.length}</div><div class="stat-label">总节点</div></div>
      <div class="stat"><div class="stat-num">${startupCount}</div><div class="stat-label">启动阶段</div></div>
      <div class="stat"><div class="stat-num">${consCount}</div><div class="stat-label">装修阶段</div></div>
      <div class="stat"><div class="stat-num">${cdCount}</div><div class="stat-label">倒计时</div></div>
    </div>`;
    previewHTML += `<table><tr><th>节点</th><th>阶段</th><th>开始</th><th>结束</th><th>负责人</th></tr>`;
    nodes.forEach(n => {
      const start = n.planned_start || "手动触发";
      const end = n.planned_end || "手动触发";
      previewHTML += `<tr><td>${n.name}</td><td>${stages[n.stage]}</td><td>${start}</td><td>${end}</td><td>${n.assignee}</td></tr>`;
    });
    previewHTML += `</table>`;

    // 添加确认按钮
    previewHTML += `<div style="margin-top:16px;display:flex;gap:12px">
      <button onclick="confirmCreate()" id="confirmBtn" class="btn btn-green">✅ 确认无误，一键创建项目</button>
      <button onclick="cancelCreate()" class="btn" style="background:#fff;color:#666;border:1px solid #d9d9d9;width:auto;padding:12px 20px">取消</button>
    </div>`;

    preview.innerHTML = previewHTML;
    preview.style.display = "block";

    // 保存表单数据
    window._formData = { name, store, date: dateVal, area };
    window._nodes = nodes;

    btn.textContent = "📝 修改信息重新生成";
    btn.disabled = false;
    return;
  }

  // 第二阶段：修改信息 → 重新预览
  btn.textContent = "🚀 生成项目时间线";
  btn.disabled = false;
  preview.style.display = "none";
  result.style.display = "none";
});

// 确认创建
async function confirmCreate() {
  const { name, store, date: dateVal, area } = window._formData || {};
  if (!name || !dateVal) return;

  const result = document.getElementById("result");
  const loadingBox = document.getElementById("loadingBox");
  const preview = document.getElementById("preview");
  const confirmBtn = document.getElementById("confirmBtn");

  confirmBtn.disabled = true;
  confirmBtn.textContent = "⏳ 创建中...";
  loadingBox.style.display = "block";
  result.style.display = "none";

  try {
    const formBody = new URLSearchParams({ name, store, opening_date: dateVal, area: String(area) });
    const resp = await fetch(FC_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: formBody.toString(),
    });

    const html = await resp.text();
    loadingBox.style.display = "none";
    preview.style.display = "none";

    if (resp.ok && html.includes("成功")) {
      result.className = "result success";
      result.innerHTML = `
        <p style="font-size:18px;font-weight:bold;margin-bottom:12px">✅ 项目创建成功！</p>
        <p style="font-size:14px;color:#333;line-height:2">
          <b>项目名称：</b>${name}<br>
          <b>开业日期：</b>${dateVal}<br>
          <b>门店面积：</b>${area}㎡<br>
          <b>总节点数：</b>${window._nodes?.length || 37} 个
        </p>
        <div style="margin-top:16px;display:flex;gap:12px">
          <a href="/hf-daily/" class="btn" style="width:auto;padding:10px 24px;text-decoration:none;display:inline-block">📋 前往项目看板</a>
          <a href="/hf-daily/create" class="btn" style="width:auto;padding:10px 24px;text-decoration:none;display:inline-block;background:#52c41a">➕ 再建一个</a>
        </div>
      `;
      result.style.display = "block";

      // 重置表单
      document.getElementById("form").querySelector("button").textContent = "🚀 生成项目时间线";
    } else {
      // 显示 FC 返回的 HTML（可能包含错误信息）
      result.className = "result error";
      result.innerHTML = `<p style="font-weight:bold">❌ 创建失败</p>
        <p style="margin-top:8px;font-size:12px">请检查网络连接后重试。如果持续失败，请确认 FC 函数是否正常运行。</p>
        <p style="margin-top:8px;font-size:11px;color:#999">服务端响应：${html.substring(0, 200)}</p>`;
      result.style.display = "block";
      confirmBtn.disabled = false;
      confirmBtn.textContent = "✅ 确认无误，一键创建项目";
    }
  } catch (err) {
    loadingBox.style.display = "none";
    result.className = "result error";
    result.innerHTML = `<p style="font-weight:bold">❌ 网络错误</p><p style="margin-top:8px">${err.message}</p>`;
    result.style.display = "block";
    confirmBtn.disabled = false;
    confirmBtn.textContent = "✅ 确认无误，一键创建项目";
  }
}

function cancelCreate() {
  document.getElementById("preview").style.display = "none";
  document.getElementById("form").querySelector("button").textContent = "🚀 生成项目时间线";
}
</script>
</body>
</html>
